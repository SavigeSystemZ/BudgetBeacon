name: android-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (defaults to current HEAD)'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build & publish signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate (lint + typecheck + tests + build)
        run: npm run validate

      - name: Audit controls baseline
        run: npm run audit:controls

      - name: Audit secrets
        run: npm run audit:secrets

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode release keystore
        env:
          BEACON_RELEASE_KEYSTORE_BASE64: ${{ secrets.BEACON_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$BEACON_RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::BEACON_RELEASE_KEYSTORE_BASE64 secret missing"
            exit 1
          fi
          echo "$BEACON_RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "BEACON_RELEASE_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Assemble signed release APK
        env:
          BEACON_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.BEACON_RELEASE_KEYSTORE_PASSWORD }}
          BEACON_RELEASE_KEY_ALIAS: ${{ secrets.BEACON_RELEASE_KEY_ALIAS }}
          BEACON_RELEASE_KEY_PASSWORD: ${{ secrets.BEACON_RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew :app:lintRelease :app:assembleRelease --no-daemon --stacktrace

      - name: Compute checksums
        id: checksums
        run: |
          APK_PATH=android/app/build/outputs/apk/release/app-release.apk
          MAPPING_PATH=android/app/build/outputs/mapping/release/mapping.txt
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::APK not found at $APK_PATH"
            exit 1
          fi
          sha256sum "$APK_PATH" | awk '{print $1}' > "$RUNNER_TEMP/apk.sha256"
          if [ -f "$MAPPING_PATH" ]; then
            cp "$MAPPING_PATH" "$RUNNER_TEMP/mapping.txt"
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_sha256=$(cat $RUNNER_TEMP/apk.sha256)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.checksums.outputs.apk_path }}
            ${{ runner.temp }}/apk.sha256
            ${{ runner.temp }}/mapping.txt
          fail_on_unmatched_files: false
