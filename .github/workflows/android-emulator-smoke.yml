name: android-emulator-smoke

on:
  pull_request:
    paths:
      - 'android/**'
      - 'capacitor.config.ts'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-emulator-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    name: Build APK + boot in Pixel 7 / API 34 emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      matrix:
        api-level: [34]
        target: [google_apis]
        arch: [x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle + capacitor sync
        run: npm run android:sync

      - name: Assemble debug APK
        run: cd android && ./gradlew :app:assembleDebug --no-daemon

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator + install APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: pixel_7
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb wait-for-device
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.aiaast.budgetbeacon/.MainActivity
            sleep 8
            adb shell dumpsys window | grep -E "mCurrentFocus|mFocusedApp" || true
            adb logcat -d -t 500 | grep -iE "FATAL|AndroidRuntime|Capacitor" || true
