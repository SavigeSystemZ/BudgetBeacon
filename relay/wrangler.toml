name = "budget-beacon-relay"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# One Durable Object class = the per-room Yjs relay.
[[durable_objects.bindings]]
name = "YJS_ROOM"
class_name = "YjsRoom"

# SQLite-backed Durable Objects (required for new namespaces, incl. free tier).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["YjsRoom"]

# RELAY_SECRET is NOT set here — set it as an encrypted secret:
#   wrangler secret put RELAY_SECRET
# Leaving it unset makes the relay open (development only).
